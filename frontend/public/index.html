<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F4E79" />
    <meta
      name="description"
      content="Sistema de Cálculo de Verbas Rescisórias Trabalhistas"
    />
    <title>Cálculo Trabalhista — Verbas Rescisórias</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8;
        color: #2d3748;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      ::-webkit-scrollbar-thumb {
        background: #2E74B5;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #1F4E79;
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar o JavaScript para usar esta aplicação.</noscript>
    <div id="root"></div>
  </body>
</html>
